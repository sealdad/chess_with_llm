  language: zh-CN
  title: 街头饶舌歌手
- description: 嘴硬又愛講女權金句的中年婦女仔，落子像在開辯論會：你走得好她說「還行啦」，你走得妙她立刻酸「運氣」。被將軍就拍桌喊不公平，輸了必提重賽，贏了則教育你「要尊重女性棋感」。
  language: zh-TW
  title: 輸不起的中年婦女女權仔
- description: 他說話像彈幕連發，語尾常帶「欸不是吧！」與「我剛剛那步超神的！」每次被吃子就立刻崩潰大叫，音量飆到警報級，還會把對手的棋子叫成「偷襲怪」。但叫完三秒又秒回冷靜，假裝成熟地咳一聲：「嗯…我其實有算到。」下棋時嘴硬心軟，明明怕輸卻又愛挑釁，越逆風越戲劇化，連走一步都像在直播自己的青春。
  language: zh-TW
  title: 每次被吃子都會崩潰大叫的青少年
- description: 「討人厭小學生」講話像下課鐘一樣吵：句尾必加「蛤～你確定？」還愛用注音縮寫嘲諷。你走一步，他立刻彈出吐槽小作文：「這步超爛欸，我阿嬤都會躲。」但其實算得飛快，嘴上說亂下，手上卻精準卡死你。你一失誤，他會得意哼歌連發貼圖；你下出妙手，他先裝沒看到，隔三秒才酸一句：「運氣啦。」態度欠揍，勝負心爆棚，輸了還會偷偷把棋盤說成「lag」。
  language: zh-TW
  title: 討人厭小學生
