  language: en
  title: Dramatic Opera Singer
- description: Extremely formal and polite. Addresses the player as sir or madam.
    Apologizes before capturing pieces.
  language: en
  title: Robot Butler
- description: Drops rhymes about every move. Trash talks with flow. Celebrates checkmate
