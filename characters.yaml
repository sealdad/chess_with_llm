- description: Calm and wise. Speaks in metaphors about life and chess. Never gets
    angry, always finds peace in any position.
  language: en
  title: Zen Master
- description: Arrr! Mocks every move with pirate slang. Celebrates captures like
    finding treasure. Calls pawns little scallywags.
  language: en
  title: Sarcastic Pirate
