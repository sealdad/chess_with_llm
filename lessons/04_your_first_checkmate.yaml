lesson_id: 04_your_first_checkmate
title: "Your First Checkmate"
title_zh: "你的第一次將殺"
description: "Learn what check and checkmate mean by delivering the famous Scholar's Mate — a 4-move checkmate that every chess player should know!"
description_zh: "透過下出著名的學者將殺來學習將軍和將殺 — 每個棋手都應該知道的4步將殺！"
difficulty: beginner
steps:
  - fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
    instruction: "We're going to checkmate in just 4 moves! Start by pushing your e-pawn forward to open lines for your bishop and queen."
    instruction_zh: "我們要在4步內將殺！先把 e 兵往前推，為象和皇后開路。"
    expected_move: "e2e4"
    illustrate: "We're about to learn the most famous quick checkmate in chess — Scholar's Mate! It only takes four moves. The key idea is teamwork between the bishop and the queen, both targeting one weak spot."
    illustrate_zh: "我們要學西洋棋中最有名的快速將殺 — 學者將殺！只需要四步。關鍵是象和皇后合作，瞄準同一個弱點。"
    demo_narration: "First, we push this center pawn forward. This opens up the diagonal paths that our bishop and queen need to attack."
    demo_narration_zh: "首先，我們把中間的兵往前推。這打開了象和皇后需要的斜線攻擊路線。"
    ending: "Start the attack — push your pawn!"
    ending_zh: "開始進攻 — 推你的兵！"
    hints:
      - "Move your e-pawn from e2 to e4. This opens diagonals for both your bishop and queen."
      - "1.e4 is the most popular first move — it controls the center and frees your attacking pieces."
    hints_zh:
      - "把 e 兵從 e2 移到 e4。這為你的象和皇后打開對角線。"
      - "1.e4 是最流行的第一步 — 控制中心並解放你的攻擊棋子。"
    explanation: "1.e4! The game begins. Your bishop on f1 and queen on d1 now have open diagonals. Both will aim at f7 — Black's weakest square."
    explanation_zh: "1.e4！遊戲開始。你在 f1 的象和 d1 的皇后現在有了開放的對角線。它們都會瞄準 f7 — 黑方最弱的格子。"

  - fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    instruction: "Now develop your bishop to c4. It aims straight at f7, which is only defended by the Black king!"
    instruction_zh: "現在把象發展到 c4。它直接瞄準 f7，那裡只有黑方國王防守！"
    expected_move: "f1c4"
    illustrate: "Now we bring out the first attacker — the bishop. Remember, the bishop slides along diagonals. We're going to aim it like a sniper at the opponent's weakest square, which is only guarded by their king."
    illustrate_zh: "現在派出第一個攻擊者 — 象。記住，象沿斜線滑動。我們要像狙擊手一樣瞄準對手最弱的格子，那裡只有國王守護。"
    demo_narration: "The bishop slides from here, all the way across to this powerful diagonal. From this position, it's locked onto the target square near the enemy king."
    demo_narration_zh: "象從這裡沿著斜線一路滑到這個強力位置。從這裡，它鎖定了敵方國王附近的目標格。"
    ending: "Place your bishop on the attack diagonal!"
    ending_zh: "把你的象放到攻擊斜線上！"
    hints:
      - "Your bishop on f1 slides diagonally to c4. From c4 it attacks f7 through d5 and e6."
      - "f7 (and f2 for White) is the weakest square at the start — only the king protects it. That's our target!"
    hints_zh:
      - "f1 的象沿斜線滑到 c4。從 c4 它透過 d5、e6 攻擊 f7。"
      - "f7（白方是 f2）是開局最弱的格子 — 只有國王保護。那就是我們的目標！"
    explanation: "2.Bc4! Your bishop points like a laser at f7. Black sees the threat but doesn't realize how dangerous it is yet."
    explanation_zh: "2.Bc4！你的象像雷射一樣瞄準 f7。黑方看到了威脅但還沒意識到有多危險。"

  - fen: "r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/8/PPPP1PPP/RNBQK1NR w KQkq - 0 3"
    instruction: "Bring out your queen to h5! She'll attack BOTH the e5 pawn AND the f7 square. This is called a double attack!"
    instruction_zh: "把皇后帶到 h5！她同時攻擊 e5 兵和 f7 格。這叫做雙重攻擊！"
    expected_move: "d1h5"
    illustrate: "Now for the deadly move — the queen joins the attack! A double attack means threatening two things at once. The opponent can only defend one, so we get the other. That's how you win in chess!"
    illustrate_zh: "現在是致命的一步 — 皇后加入攻擊！雙重攻擊就是同時威脅兩個目標。對手只能防一個，另一個就是我們的。這就是下棋贏棋的方式！"
    demo_narration: "Watch the queen sweep across the diagonal to land right here. From this spot, she attacks both the undefended pawn and that weak square near the king. Two threats, one move!"
    demo_narration_zh: "看皇后沿著斜線一掃而過，降落在這裡。從這個位置，她同時攻擊那個沒防守的兵和國王旁邊的弱點。兩個威脅，一步棋！"
    ending: "Unleash your queen — create the double attack!"
    ending_zh: "釋放你的皇后 — 製造雙重攻擊！"
    hints:
      - "Move your queen from d1 to h5. She travels diagonally: d1-e2-f3-g4-h5."
      - "From h5, the queen attacks e5 (can capture the pawn) AND f7 (threatens checkmate with the bishop)!"
    hints_zh:
      - "把皇后從 d1 移到 h5。她走對角線：d1-e2-f3-g4-h5。"
      - "從 h5，皇后同時攻擊 e5（可以吃兵）和 f7（配合象威脅將殺）！"
    explanation: "3.Qh5! A powerful double attack. The queen threatens Qxe5 (winning a pawn) and Qxf7# (checkmate!). Black needs to defend BOTH threats — but that's very hard!"
    explanation_zh: "3.Qh5！強力的雙重攻擊。皇后威脅 Qxe5（吃兵）和 Qxf7#（將殺）。黑方需要同時防守兩個威脅 — 但那非常困難！"

  - fen: "r1bqkb1r/pppp1ppp/2n2n2/4p2Q/2B1P3/8/PPPP1PPP/RNB1K1NR w KQkq - 0 4"
    instruction: "Black played Nf6 trying to attack your queen — but they forgot about f7! Capture on f7 with your queen. It's CHECKMATE!"
    instruction_zh: "黑方走了 Nf6 想攻擊你的皇后 — 但他們忘了 f7！用皇后吃 f7。這是將殺！"
    expected_move: "h5f7"
    illustrate: "Black made a mistake — they tried to chase our queen but left their king unprotected! This is checkmate: the king is attacked and has absolutely nowhere to escape. Every square around it is covered."
    illustrate_zh: "黑方犯了錯 — 他們想趕走皇后，但卻讓國王毫無防守！這就是將殺：國王被攻擊，而且完全無處可逃。周圍每個格子都被控制了。"
    demo_narration: "The queen swoops in to capture this pawn, giving check. The bishop protects our queen from behind. Look around the king — every escape square is blocked or attacked. That's checkmate!"
    demo_narration_zh: "皇后飛過去吃掉這個兵，將軍！象從後方保護我們的皇后。看看國王周圍 — 每個逃跑的格子都被擋住或攻擊了。這就是將殺！"
    ending: "Deliver the checkmate — capture that pawn with your queen!"
    ending_zh: "下出將殺 — 用皇后吃掉那個兵！"
    hints:
      - "Your queen on h5 can capture the pawn on f7. The bishop on c4 protects your queen there."
      - "After Qxf7: the queen checks the king, and the king has NOWHERE to run. d8 is blocked by Black's own queen, d7/e7/f8 are all attacked!"
    hints_zh:
      - "h5 的皇后可以吃 f7 的兵。c4 的象在那裡保護你的皇后。"
      - "Qxf7 之後：皇后將軍國王，國王無處可逃。d8 被自己的皇后擋住，d7/e7/f8 都被攻擊！"
    explanation: "4.Qxf7# — CHECKMATE! The queen on f7 gives check, protected by the bishop on c4. The king can't escape: d8 blocked by own queen, d7 attacked by queen (7th rank), e7 attacked by queen (diagonal), f8 attacked by queen (f-file). This is Scholar's Mate — now you know what checkmate looks like!"
    explanation_zh: "4.Qxf7# — 將殺！f7 的皇后將軍，被 c4 的象保護。國王無法逃脫：d8 被自己的皇后擋住，d7 被皇后攻擊（第7行），e7 被皇后攻擊（斜線），f8 被皇后攻擊（f 列）。這就是學者將殺 — 現在你知道將殺是什麼樣子了！"
