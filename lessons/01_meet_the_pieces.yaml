lesson_id: 01_meet_the_pieces
title: "Meet the Pieces"
title_zh: "認識棋子"
description: "Learn how each chess piece moves by playing real opening moves. Every piece gets its moment!"
description_zh: "透過真正的開局走法學習每個棋子怎麼走。每個棋子都有表現的機會！"
difficulty: beginner
steps:
  - fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
    instruction: "The PAWN moves forward 1 or 2 squares from its starting row. Push your e-pawn two squares to control the center!"
    instruction_zh: "兵（Pawn）從起始行可以向前走1或2格。把你的 e 兵往前推兩格控制中心！"
    expected_move: "e2e4"
    illustrate: "Let's start with the pawn — the smallest but bravest piece on the board. Pawns march forward one square at a time, but on their very first move they can leap forward two squares. They capture diagonally, not straight ahead — that's the tricky part!"
    illustrate_zh: "我們先從兵開始 — 棋盤上最小但最勇敢的棋子。兵一次往前走一格，但第一步可以跳兩格。它們斜著吃子，不是直著 — 這是最容易搞混的地方！"
    demo_narration: "Watch — I'm pointing at this pawn right here in the middle. It's going to push forward two squares to grab control of the center of the board."
    demo_narration_zh: "看 — 我指的是中間的這個兵。它要往前推兩格，搶佔棋盤的中心位置。"
    ending: "Your turn! Push that pawn forward two squares."
    ending_zh: "換你了！把那個兵往前推兩格。"
    hints:
      - "Click the pawn on e2, then click e4 (two squares forward)."
      - "Pawns can move 2 squares forward on their very first move. After that, only 1 square."
    hints_zh:
      - "點擊 e2 的兵，然後點擊 e4（往前兩格）。"
      - "兵在第一步可以走兩格，之後只能走一格。"
    explanation: "Your pawn claims the center! Pawns move forward but capture diagonally — that's the trickiest rule for beginners. Now let's bring out the other pieces!"
    explanation_zh: "你的兵佔領了中心！兵向前走但斜著吃子 — 這是初學者最容易搞混的規則。現在讓我們把其他棋子帶出來！"

  - fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    instruction: "The KNIGHT jumps in an L-shape (2+1 squares) and can leap over pieces. Bring your knight out to f3!"
    instruction_zh: "馬（Knight）跳 L 形（2格+1格），而且可以跳過其他棋子。把你的馬跳到 f3！"
    expected_move: "g1f3"
    illustrate: "Now meet the knight — the trickiest piece! It moves in an L-shape: two squares in one direction, then one square to the side. The knight is also the only piece that can jump over other pieces."
    illustrate_zh: "現在來認識馬 — 最特別的棋子！它走 L 形：一個方向走兩格，再轉彎走一格。馬也是唯一可以跳過其他棋子的棋子。"
    demo_narration: "See this knight tucked in the corner? It's going to leap right over the pawns and land here, attacking the center. That's the beauty of the knight — nothing can block its jump."
    demo_narration_zh: "看到角落的這匹馬嗎？它要跳過兵，降落在這裡，攻擊中心。這就是馬的厲害之處 — 沒有東西能擋住它的跳躍。"
    ending: "Now you try — jump your knight out!"
    ending_zh: "換你 — 把馬跳出來！"
    hints:
      - "Your knight is on g1. It can jump to f3 (2 up, 1 left) or h3 (2 up, 1 right). f3 is better — it attacks the center."
      - "Knights are the only piece that can jump over other pieces. That's why we can develop them first!"
    hints_zh:
      - "你的馬在 g1。它可以跳到 f3（上2左1）或 h3（上2右1）。f3 更好 — 攻擊中心。"
      - "馬是唯一可以跳過其他棋子的棋子。所以我們可以最先發展它！"
    explanation: "Your knight attacks Black's pawn and controls the center. Knights move in an L-shape — 2 squares one way, then 1 square to the side. They're great at surprise attacks!"
    explanation_zh: "你的馬攻擊黑方的兵並控制中心。馬走 L 形 — 一個方向走2格，再轉彎走1格。非常適合出其不意！"

  - fen: "r1bqkbnr/pppp1ppp/2n5/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R w KQkq - 0 3"
    instruction: "The BISHOP slides diagonally as far as it wants. Develop your bishop to c4, aiming at Black's weak f7 square!"
    instruction_zh: "象（Bishop）沿斜線滑動，想走多遠就多遠。把你的象發展到 c4，瞄準黑方脆弱的 f7！"
    expected_move: "f1c4"
    illustrate: "The bishop is a long-range sniper. It slides along diagonals as far as it wants — but it's stuck on one color forever. This bishop lives on light squares its whole life."
    illustrate_zh: "象是遠程狙擊手。它沿著斜線滑動，想走多遠就多遠 — 但它一輩子都困在同一個顏色的格子上。這個象永遠住在淺色格上。"
    demo_narration: "Watch the bishop slide from here all the way across the diagonal to this square. From there, it's pointing straight at the opponent's weakest spot."
    demo_narration_zh: "看象從這裡沿著斜線一路滑到這個位置。從那裡，它直接瞄準對手最脆弱的點。"
    ending: "Go ahead — slide your bishop into position!"
    ending_zh: "來吧 — 把你的象滑到位置上！"
    hints:
      - "Your bishop on f1 can slide diagonally to e2, d3, c4, b5, or a6. c4 is the strongest — it aims right at f7."
      - "f7 is Black's weakest point because only the king defends it. Your bishop on c4 puts pressure there."
    hints_zh:
      - "你在 f1 的象可以沿斜線走到 e2、d3、c4、b5 或 a6。c4 最強 — 直接瞄準 f7。"
      - "f7 是黑方最弱的點，因為只有國王防守。c4 的象對那裡施壓。"
    explanation: "The Italian Opening — your bishop controls a powerful diagonal aiming at f7. Bishops stay on one color their whole life: this one lives on light squares forever."
    explanation_zh: "意大利開局 — 你的象控制一條強力對角線，瞄準 f7。象一輩子都在同一個顏色的格子上：這個象永遠在淺色格上。"

  - fen: "r1bqk1nr/pppp1ppp/2n5/2b1p3/2B1P3/5N2/PPPP1PPP/RNBQK2R w KQkq - 0 4"
    instruction: "CASTLING is a special move — the KING and ROOK move together! The king slides 2 squares toward the rook, and the rook jumps over. Castle kingside to protect your king!"
    instruction_zh: "王車易位是特殊走法 — 國王和車一起動！國王向車的方向滑2格，車跳過國王。進行王側王車易位保護你的國王！"
    expected_move: "e1g1"
    illustrate: "Time for a special move — castling! This is the only time two pieces move at once. The king slides two squares toward the rook, and the rook hops over the king. It makes your king safe and activates your rook."
    illustrate_zh: "該學特殊走法了 — 王車易位！這是唯一一次兩個棋子同時移動。國王向車的方向滑兩格，車跳過國王。這讓國王安全，同時啟動你的車。"
    demo_narration: "Look — the king moves from here to here, two squares over. And the rook jumps from the corner to right next to the king. Two pieces, one move!"
    demo_narration_zh: "看 — 國王從這裡移到這裡，走兩格。然後車從角落跳到國王旁邊。兩個棋子，一步棋！"
    ending: "Now castle your king to safety!"
    ending_zh: "現在把你的國王安全地易位吧！"
    hints:
      - "To castle kingside, move your king from e1 to g1. The rook automatically goes from h1 to f1."
      - "You can only castle when: (1) King and rook haven't moved, (2) No pieces between them, (3) King is not in check."
    hints_zh:
      - "王側王車易位：把國王從 e1 移到 g1，車會自動從 h1 到 f1。"
      - "王車易位的條件：(1) 國王和車都沒走過，(2) 中間沒有棋子，(3) 國王沒有被將軍。"
    explanation: "King safe behind pawns, rook active on f1. Always try to castle in the first 10 moves — an exposed king is the number one reason beginners lose!"
    explanation_zh: "國王安全地躲在兵後面，車在 f1 變得活躍。盡量在前10步內王車易位 — 國王暴露是初學者輸棋的第一原因！"

  - fen: "r1bqk1nr/ppp2ppp/2np4/2b1p3/2B1P3/5N2/PPPP1PPP/RNBQ1RK1 w kq - 0 5"
    instruction: "Time to challenge the center! Push your d-pawn to d4 — when pawns collide, exciting things happen. If Black captures, we'll bring out the QUEEN to recapture!"
    instruction_zh: "是時候挑戰中心了！把 d 兵推到 d4 — 當兵碰撞時，精彩的事情就會發生。如果黑方吃了，我們就派皇后出馬吃回來！"
    expected_move: "d2d4"
    illustrate: "Now we're going to create some action! When pawns collide in the center, captures happen — and that's where the fun begins. We're setting a trap for our most powerful piece to enter the game."
    illustrate_zh: "現在我們要製造一些精彩的場面！當兵在中心碰撞時，吃子就會發生 — 精彩從此開始。我們在為最強的棋子出場設陷阱。"
    demo_narration: "Watch this pawn push forward to challenge the opponent's pawn. If they capture, that's exactly what we want — it opens the door for our queen!"
    demo_narration_zh: "看這個兵往前推，挑戰對手的兵。如果他們吃了，那正是我們要的 — 這為皇后打開了大門！"
    ending: "Push that pawn forward and start the action!"
    ending_zh: "把兵推上去，開始精彩的對局！"
    hints:
      - "Push your d-pawn from d2 to d4. It directly challenges Black's e5 pawn."
      - "Don't worry if Black captures your pawn — that's exactly what we want! Our queen is ready."
    hints_zh:
      - "把 d 兵從 d2 推到 d4。它直接挑戰黑方的 e5 兵。"
      - "別擔心黑方吃你的兵 — 那正是我們想要的！皇后已經準備好了。"
    explanation: "A bold center challenge! Black will capture your pawn — but that's part of the plan. It opens the way for our most powerful piece to join the fight!"
    explanation_zh: "大膽的中心挑戰！黑方會吃你的兵 — 但那正是計劃的一部分。這為我們最強的棋子加入戰鬥開了路！"

  - fen: "r1bqk1nr/ppp2ppp/2np4/2b5/2BpP3/5N2/PPP2PPP/RNBQ1RK1 w kq - 0 6"
    instruction: "Black captured your pawn! Now bring out the QUEEN — the most powerful piece on the board. She moves like a rook AND bishop combined, in any straight line. Recapture on d4 with your queen!"
    instruction_zh: "黑方吃了你的兵！現在派出皇后（Queen）— 棋盤上最強的棋子。她結合了車和象的走法，可以沿任何直線移動。用皇后吃回 d4！"
    expected_move: "d1d4"
    illustrate: "Here comes the queen — the most powerful piece in chess! She combines the power of the rook and the bishop, moving in any straight line — horizontal, vertical, or diagonal. She's worth nine points, more than any other piece."
    illustrate_zh: "皇后來了 — 西洋棋中最強大的棋子！她結合了車和象的力量，可以沿任何直線移動 — 橫、直、斜都行。她價值九分，比其他任何棋子都高。"
    demo_narration: "The queen slides straight up from her starting position to recapture the pawn right in the center. Look how she commands the whole board from there!"
    demo_narration_zh: "皇后從她的位置直線向上滑，吃回中心的兵。看她從那裡掌控整個棋盤！"
    ending: "Send your queen out to take back that pawn!"
    ending_zh: "派你的皇后去把兵吃回來！"
    hints:
      - "Your queen on d1 can slide straight up through d2 and d3 to capture on d4."
      - "The queen can move any number of squares in any straight line — horizontal, vertical, or diagonal. She's the most versatile piece!"
    hints_zh:
      - "d1 的皇后可以沿著 d 線經過 d2、d3 直接吃 d4。"
      - "皇后可以沿任何直線走任意格數 — 橫、直、斜都行。她是最靈活的棋子！"
    explanation: "Your queen commands the center! She recaptured the pawn and now controls lines in every direction. The queen is worth 9 points — more than any other piece. Use her power, but keep her safe!"
    explanation_zh: "你的皇后坐鎮中心！她吃回了兵，現在控制四面八方的路線。皇后價值9分 — 比其他任何棋子都高。善用她的力量，但要保護好她！"

  - fen: "r1bqk2r/ppp2ppp/2np1n2/2b5/2BQP3/5N2/PPP2PPP/RNB2RK1 w kq - 1 7"
    instruction: "Last piece to meet: the ROOK! Rooks slide in straight lines — up, down, left, or right — as far as they want. Move your rook from f1 to e1 to control the open center file!"
    instruction_zh: "最後一個要認識的棋子：車（Rook）！車沿直線滑動 — 上、下、左、右 — 想走多遠就多遠。把車從 f1 移到 e1 控制開放的中心線！"
    expected_move: "f1e1"
    illustrate: "Last but not least — the rook! The rook is a powerhouse that slides in straight lines: up, down, left, or right, as far as it wants. It's worth five points and loves open files with no pawns in the way."
    illustrate_zh: "最後登場 — 車！車是強力棋子，沿直線滑動：上、下、左、右，想走多遠就多遠。它價值五分，最愛沒有兵擋路的開放線。"
    demo_narration: "See the rook here? It just needs to slide one square over to take control of this wide-open center file. Simple but powerful."
    demo_narration_zh: "看到這邊的車嗎？它只需要滑一格就能控制這條大開的中心線。簡單但強大。"
    ending: "Move your rook over and take control of that file — you've almost met every piece!"
    ending_zh: "把車移過去控制那條線 — 你快認識完所有棋子了！"
    hints:
      - "Your rook on f1 can slide left one square to e1. From there it controls the entire e-file."
      - "Rooks are strongest on open files — files with no pawns blocking them. The e-file is perfect!"
    hints_zh:
      - "f1 的車可以向左滑一格到 e1。從那裡它控制整條 e 線。"
      - "車在開放線（沒有兵擋路的線）上最強。e 線是完美的選擇！"
    explanation: "Your rook takes command of the open e-file! Rooks are worth 5 points and love open lines. You've now used ALL six piece types: Pawn, Knight, Bishop, King and Rook together in castling, Queen, and now the Rook on its own. You know how every piece moves — you're ready to play chess!"
    explanation_zh: "車佔據了開放的 e 線！車價值5分，最愛開放的線路。你現在已經使用了全部六種棋子：兵、馬、象、國王和車一起王車易位、皇后、以及車的獨立移動。你知道每個棋子怎麼走了 — 你準備好下棋了！"
