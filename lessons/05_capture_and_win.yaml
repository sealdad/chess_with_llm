lesson_id: 05_capture_and_win
title: "Capture and Win"
title_zh: "吃子與取勝"
description: "Learn how to capture opponent's pieces and recapture when they take yours. These skills are essential for winning games!"
description_zh: "學習如何吃對方的棋子以及回吃。這些技巧是贏棋的關鍵！"
difficulty: beginner
steps:
  - fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
    instruction: "Start by controlling the center with your e-pawn. A strong center gives your pieces more room to move!"
    instruction_zh: "先用 e 兵控制中心。強大的中心讓你的棋子有更多活動空間！"
    expected_move: "e2e4"
    illustrate: "The center of the board is the most important territory in chess. Whoever controls it controls the game. Pawns in the center give your other pieces room to develop and attack."
    illustrate_zh: "棋盤的中心是西洋棋中最重要的領地。誰控制了中心，誰就控制了比賽。中心的兵為其他棋子提供發展和進攻的空間。"
    demo_narration: "We start by pushing this center pawn forward two squares. It immediately stakes a claim on the most valuable real estate on the board."
    demo_narration_zh: "我們先把中間的兵往前推兩格。它立刻佔領了棋盤上最有價值的地盤。"
    ending: "Grab the center — push your pawn!"
    ending_zh: "搶佔中心 — 推你的兵！"
    hints:
      - "Move your e-pawn from e2 to e4."
      - "1.e4 controls the center and opens lines for your bishop and queen."
    hints_zh:
      - "把 e 兵從 e2 移到 e4。"
      - "1.e4 控制中心並為象和皇后開路。"
    explanation: "1.e4! Good start — you control the center and prepare to develop."
    explanation_zh: "1.e4！好的開始 — 你控制了中心並準備發展棋子。"

  - fen: "rnbqkbnr/pppp1ppp/8/4p3/4P3/8/PPPP1PPP/RNBQKBNR w KQkq - 0 2"
    instruction: "Develop your knight toward the center. Good development means bringing your pieces to active squares quickly!"
    instruction_zh: "把馬發展到靠近中心的位置。好的發展就是快速把棋子帶到活躍的位置！"
    expected_move: "g1f3"
    illustrate: "Development is one of the golden rules of chess — get your pieces off the back rank and into the action as fast as possible. Knights should come out early because they have clear best squares."
    illustrate_zh: "發展棋子是西洋棋的黃金法則之一 — 盡快把棋子從後排帶到戰場上。馬應該最早出動，因為它們有明確的最佳位置。"
    demo_narration: "The knight leaps out from the corner to this central square, where it attacks the opponent's pawn and watches over important center squares."
    demo_narration_zh: "馬從角落跳出來到這個中心位置，在那裡攻擊對手的兵，同時看守重要的中心格。"
    ending: "Develop your knight — jump it out!"
    ending_zh: "發展你的馬 — 跳出來！"
    hints:
      - "Bring your knight from g1 to f3, where it attacks e5 and controls center squares."
      - "Knights before bishops! Knights have one obvious best square (f3/c3), so develop them first."
    hints_zh:
      - "把馬從 g1 帶到 f3，在那裡攻擊 e5 並控制中心格。"
      - "馬先於象！馬有一個明顯的最佳位置（f3/c3），所以先發展它們。"
    explanation: "2.Nf3! Your knight attacks the e5 pawn and controls center squares d4 and e5."
    explanation_zh: "2.Nf3！你的馬攻擊 e5 兵並控制中心格 d4 和 e5。"

  - fen: "r1bqkbnr/pppp1ppp/2n5/4p3/4P3/5N2/PPPP1PPP/RNBQKB1R w KQkq - 0 3"
    instruction: "Now challenge Black's center with d4! When two pawns face each other, captures create exciting play. Push d4 to attack Black's e5 pawn!"
    instruction_zh: "現在用 d4 挑戰黑方的中心！當兩個兵面對面時，吃子創造精彩的對局。推 d4 攻擊黑方的 e5 兵！"
    expected_move: "d2d4"
    illustrate: "Here's where things get exciting — we're going to create a pawn collision! When pawns face each other, one can capture the other. This opens up the position and creates opportunities for both sides."
    illustrate_zh: "精彩的部分來了 — 我們要製造兵的碰撞！當兵面對面時，一方可以吃掉另一方。這打開了局面，為雙方創造機會。"
    demo_narration: "This pawn pushes forward to directly challenge the opponent's center pawn. They're nose to nose now — one of them will be captured!"
    demo_narration_zh: "這個兵往前推，直接挑戰對手的中心兵。它們現在面對面 — 其中一個會被吃掉！"
    ending: "Create the collision — push your pawn forward!"
    ending_zh: "製造碰撞 — 把兵推上去！"
    hints:
      - "Push your d-pawn from d2 to d4. It directly challenges Black's e5 pawn."
      - "When you push d4, Black will likely capture dxe4 or exd4. Don't worry — we'll take back!"
    hints_zh:
      - "把 d 兵從 d2 推到 d4。它直接挑戰黑方的 e5 兵。"
      - "你推 d4 後，黑方可能會吃 exd4。別擔心 — 我們會吃回來！"
    explanation: "3.d4! The Scotch Game — a bold center challenge. If Black captures exd4, you'll recapture and control the center!"
    explanation_zh: "3.d4！蘇格蘭開局 — 大膽的中心挑戰。如果黑方吃 exd4，你會吃回來控制中心！"

  - fen: "r1bqkbnr/pppp1ppp/2n5/8/3pP3/5N2/PPP2PPP/RNBQKB1R w KQkq - 0 4"
    instruction: "Black captured your pawn! (exd4) The golden rule: ALWAYS recapture when the opponent takes your piece. Take back with your knight!"
    instruction_zh: "黑方吃了你的兵！（exd4）黃金法則：對方吃你的棋子時，一定要吃回來。用馬吃回來！"
    expected_move: "f3d4"
    illustrate: "The opponent just captured our pawn — and here's the most important lesson today. In chess, you should almost always recapture when someone takes your piece. If you don't, you fall behind in material, and that usually means losing."
    illustrate_zh: "對手剛吃了我們的兵 — 這是今天最重要的一課。在西洋棋中，對方吃你的棋子時，你幾乎一定要吃回來。不然你的子力就會落後，通常就意味著輸棋。"
    demo_narration: "Our knight jumps right into the center to recapture that pawn. Not only do we get the pawn back, but the knight lands on a powerful square — that's a win-win!"
    demo_narration_zh: "我們的馬直接跳到中心吃回那個兵。不僅拿回了兵，馬還站在了一個強力位置 — 一舉兩得！"
    ending: "Recapture with your knight — don't let them get ahead!"
    ending_zh: "用馬吃回來 — 別讓他們佔便宜！"
    hints:
      - "Your knight on f3 can jump to d4 to capture the black pawn. That's an L-shape: 1 left + 2 up."
      - "Nxd4 is better than Qxd4 — you develop a piece to a powerful center square while recapturing!"
    hints_zh:
      - "f3 的馬可以跳到 d4 吃掉黑兵。那是 L 形：左1上2。"
      - "Nxd4 比 Qxd4 好 — 你在吃回來的同時把棋子發展到強力的中心位置！"
    explanation: "4.Nxd4! You recaptured AND got a great knight in the center. This is the key lesson: when the opponent takes your piece, ALWAYS look to take back. Don't let them get ahead in material!"
    explanation_zh: "4.Nxd4！你吃回來了，而且馬在中心位置很棒。這是關鍵教訓：對方吃你的棋子時，一定要想辦法吃回來。別讓他們在子力上領先！"

  - fen: "r1bqkb1r/pppp1ppp/2n2n2/8/3NP3/8/PPP2PPP/RNBQKB1R w KQkq - 0 5"
    instruction: "Keep developing! Bring your second knight out. Two well-placed knights control the whole center. You're ready to play a real game!"
    instruction_zh: "繼續發展！把第二匹馬帶出來。兩匹位置好的馬控制整個中心。你準備好下一盤真正的棋了！"
    expected_move: "b1c3"
    illustrate: "You're doing great! Let's finish strong by developing our last knight. Having two knights out and working together in the center is one of the best positions you can have in the opening."
    illustrate_zh: "你做得很好！讓我們把最後一匹馬發展出來，完美收尾。兩匹馬在中心一起工作，是開局中最好的位置之一。"
    demo_narration: "This knight hops out to join its partner in the center. Together they control a huge number of squares — look at all the territory they cover!"
    demo_narration_zh: "這匹馬跳出來加入中心的夥伴。它們一起控制了大量的格子 — 看看它們覆蓋的領地有多大！"
    ending: "Bring out your last knight — complete the development!"
    ending_zh: "把最後一匹馬帶出來 — 完成發展！"
    hints:
      - "Your knight on b1 can jump to c3 — another great central square."
      - "Nc3 develops a piece, controls d5 and e4, and prepares to castle. One move, many benefits!"
    hints_zh:
      - "b1 的馬可以跳到 c3 — 另一個很棒的中心位置。"
      - "Nc3 發展棋子、控制 d5 和 e4、並準備王車易位。一步棋多個好處！"
    explanation: "5.Nc3! Excellent — you have two knights dominating the center, a strong pawn on e4, and you're ready to develop your bishops and castle. You've learned the 3 essentials: develop pieces, control the center, and ALWAYS recapture. You're ready to play!"
    explanation_zh: "5.Nc3！太棒了 — 你有兩匹馬主宰中心、e4 有強力的兵，準備好發展象和王車易位。你學到了3個要點：發展棋子、控制中心、一定要吃回來。你準備好下棋了！"
