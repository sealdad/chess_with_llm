lesson_id: 03_london_system
title: "The London System"
title_zh: "倫敦體系"
description: "Learn the London System — a solid, easy-to-learn opening for White. Same setup every game, regardless of what Black plays!"
description_zh: "學習倫敦體系 — 白方穩固且容易學的開局。不管黑方怎麼走，你的佈陣都一樣！"
difficulty: beginner
steps:
  - fen: "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
    instruction: "The London System starts with the queen's pawn. Push d4 to control the center from a different angle than e4!"
    instruction_zh: "倫敦體系從皇后兵開始。推 d4 從不同的角度控制中心！"
    expected_move: "d2d4"
    illustrate: "Welcome to the London System — the perfect opening for players who want something solid and reliable. The beauty of the London is that you play almost the same moves every game, no matter what your opponent does. It starts with the queen's pawn."
    illustrate_zh: "歡迎來到倫敦體系 — 想要穩固可靠開局的棋手的完美選擇。倫敦的美妙之處在於，不管對手怎麼走，你幾乎每盤都下同樣的走法。它從皇后兵開始。"
    demo_narration: "We push this pawn forward two squares. Unlike the king's pawn opening, this controls the center from the queen's side."
    demo_narration_zh: "我們把這個兵往前推兩格。和王兵開局不同，這是從皇后側控制中心。"
    ending: "Start the London — push your d-pawn!"
    ending_zh: "開始倫敦體系 — 推你的 d 兵！"
    hints:
      - "Push your d-pawn from d2 to d4."
      - "1.d4 controls the center just like 1.e4 but leads to different types of games."
    hints_zh:
      - "把 d 兵從 d2 推到 d4。"
      - "1.d4 和 1.e4 一樣控制中心，但會導致不同類型的棋局。"
    explanation: "1.d4! The London begins. Black matches with d5, and now comes the signature move of this opening."
    explanation_zh: "1.d4！倫敦體系開始。黑方用 d5 對稱，現在要來這個開局的招牌走法了。"

  - fen: "rnbqkbnr/ppp1pppp/8/3p4/3P4/8/PPP1PPPP/RNBQKBNR w KQkq - 0 2"
    instruction: "The secret of the London — develop your bishop to f4 BEFORE playing e3! This is the signature move. Once you play e3, this bishop gets trapped behind your pawns."
    instruction_zh: "倫敦的秘訣 — 在走 e3 之前先把象發展到 f4！這是招牌走法。一旦走了 e3，這個象就會被困在兵後面。"
    expected_move: "c1f4"
    illustrate: "Here's the key to the whole London System — develop this bishop NOW, before anything else. Why? Because in most queen's pawn openings, this bishop gets stuck behind your own pawns. In the London, we make sure it gets out first to an active square."
    illustrate_zh: "這就是整個倫敦體系的關鍵 — 現在就發展這個象，在其他一切之前。為什麼？因為在大多數皇后兵開局中，這個象會被困在自己的兵後面。在倫敦體系中，我們確保它先跑到活躍的位置。"
    demo_narration: "This bishop swoops out from behind the pawns to this commanding diagonal. It controls important squares and can't be blocked by our own pawns anymore."
    demo_narration_zh: "這個象從兵後面飛出來到這條佔優的對角線。它控制重要的格子，再也不會被自己的兵擋住了。"
    ending: "Make the London's signature move — free your bishop!"
    ending_zh: "走出倫敦的招牌走法 — 解放你的象！"
    hints:
      - "Move your bishop from c1 to f4. It must come out before e3."
      - "2.Bf4 is the trademark of the London System. The bishop is active and safe on f4."
    hints_zh:
      - "把象從 c1 移到 f4。它必須在 e3 之前出來。"
      - "2.Bf4 是倫敦體系的標誌。象在 f4 既活躍又安全。"
    explanation: "The London bishop takes its post! This bishop will stay active on this diagonal throughout the game. Black develops their knight."
    explanation_zh: "倫敦的象就位了！這個象會在整場棋局中都在這條對角線上保持活躍。黑方發展了他們的馬。"

  - fen: "rnbqkb1r/ppp1pppp/5n2/3p4/3P1B2/8/PPP1PPPP/RN1QKBNR w KQkq - 2 3"
    instruction: "Now play e3 to build a solid pawn structure. Your center is rock-solid and your bishop is already safe outside the pawn chain!"
    instruction_zh: "現在走 e3 建立穩固的兵形。你的中心像磐石一樣穩固，而象已經安全地在兵鏈外面了！"
    expected_move: "e2e3"
    illustrate: "Now we lock in our solid pawn structure. This pawn move creates a strong pyramid shape in the center. Notice how your bishop is already outside — if we had played this move first, the bishop would be trapped forever."
    illustrate_zh: "現在我們鎖定穩固的兵形。這步兵的移動在中心創造了一個堅固的金字塔形狀。注意你的象已經在外面了 — 如果先走這步，象就會永遠被困住。"
    demo_narration: "This pawn steps forward to complete the pyramid. Our center is now like a fortress — strong, solid, and hard to break through."
    demo_narration_zh: "這個兵往前走一步完成金字塔。我們的中心現在像堡壘一樣 — 堅固、穩定、很難突破。"
    ending: "Build your fortress — push the pawn!"
    ending_zh: "建造你的堡壘 — 推兵！"
    hints:
      - "Push your e-pawn one square from e2 to e3."
      - "e3 supports d4 and creates a safe, solid pawn structure. Your bishop is already free!"
    hints_zh:
      - "把 e 兵從 e2 推一格到 e3。"
      - "e3 支撐 d4 並創造安全、穩固的兵形。你的象已經自由了！"
    explanation: "A rock-solid center! Your pawns on d4 and e3 support each other perfectly. Black develops with e6, mirroring your solid setup."
    explanation_zh: "堅如磐石的中心！d4 和 e3 的兵完美地互相支撐。黑方用 e6 發展，模仿你的穩固佈局。"

  - fen: "rnbqkb1r/ppp2ppp/4pn2/3p4/3P1B2/4P3/PPP2PPP/RN1QKBNR w KQkq - 0 4"
    instruction: "Develop your knight to f3. Good development means getting pieces to active, central squares!"
    instruction_zh: "把馬發展到 f3。好的發展就是把棋子帶到活躍的中心位置！"
    expected_move: "g1f3"
    illustrate: "Keep developing! The knight heads to its natural best square in the center, where it controls key squares and supports your pawn structure. Every piece should earn its place on the board."
    illustrate_zh: "繼續發展棋子！馬前往中心的最佳位置，控制關鍵格子並支撐你的兵形。每個棋子都應該在棋盤上佔有一席之地。"
    demo_narration: "The knight leaps to this central square where it guards the center and keeps everything solid."
    demo_narration_zh: "馬跳到中心位置，守護中心，讓一切都穩固。"
    ending: "Bring your knight into action!"
    ending_zh: "把你的馬帶入戰鬥！"
    hints:
      - "Jump your knight from g1 to f3."
      - "Nf3 develops a piece, supports d4, and prepares castling."
    hints_zh:
      - "把馬從 g1 跳到 f3。"
      - "Nf3 發展棋子、支撐 d4、並準備易位。"
    explanation: "Excellent development! Your knight joins the fight. Black develops their bishop, getting ready to castle."
    explanation_zh: "出色的發展！你的馬加入戰鬥。黑方發展他們的象，準備易位。"

  - fen: "rnbqk2r/ppp2ppp/3bpn2/3p4/3P1B2/4PN2/PPP2PPP/RN1QKB1R w KQkq - 2 5"
    instruction: "Develop your second bishop to d3. In the London, both bishops go to the third rank — it's a beautiful, symmetrical setup!"
    instruction_zh: "把第二個象發展到 d3。在倫敦體系中，兩個象都去到第三行 — 這是漂亮的對稱佈局！"
    expected_move: "f1d3"
    illustrate: "Now our second bishop comes out. In the London System, both bishops end up on the third rank — one on f4 and one on d3. Together they form a strong pair watching over the whole board. The d3 bishop also eyes the enemy kingside."
    illustrate_zh: "現在第二個象出來。在倫敦體系中，兩個象都在第三行 — 一個在 f4，一個在 d3。它們組成強力的一對，監視整個棋盤。d3 的象還瞄準敵方的王翼。"
    demo_narration: "This bishop comes to this square, creating a perfect pair with its partner on the other side. Together they cover light and dark squares beautifully."
    demo_narration_zh: "這個象來到這個位置，和另一邊的搭檔形成完美的組合。它們一起完美地覆蓋淺色和深色格子。"
    ending: "Complete the bishop pair — develop it now!"
    ending_zh: "完成象的組合 — 現在發展它！"
    hints:
      - "Slide your bishop from f1 to d3."
      - "Bd3 points toward the kingside and creates the classic London bishop setup."
    hints_zh:
      - "把象從 f1 滑到 d3。"
      - "Bd3 指向王翼，創造經典的倫敦象佈局。"
    explanation: "Beautiful setup! Both bishops are developed to active squares. Black castles, and now it's your turn to do the same."
    explanation_zh: "漂亮的佈局！兩個象都發展到了活躍的位置。黑方易位了，現在輪到你了。"

  - fen: "rnbq1rk1/ppp2ppp/3bpn2/3p4/3P1B2/3BPN2/PPP2PPP/RN1QK2R w KQ - 4 6"
    instruction: "Castle kingside! Your king needs safety, and the rook needs to join the game."
    instruction_zh: "王側易位！你的國王需要安全，車也需要加入比賽。"
    expected_move: "e1g1"
    illustrate: "Just like in the Italian Game, castling early is crucial. Your pieces are developed and the path is clear. Time to tuck the king away safely and bring the rook into play."
    illustrate_zh: "和意大利開局一樣，盡早易位至關重要。你的棋子已經發展完畢，道路暢通。是時候把國王安全地藏起來，並把車帶入比賽了。"
    demo_narration: "King slides to safety behind the pawns, and the rook jumps into the game. Your setup is nearly complete."
    demo_narration_zh: "國王滑到兵後面的安全位置，車跳入比賽。你的佈陣幾乎完成了。"
    ending: "Castle your king to safety!"
    ending_zh: "把國王易位到安全的地方！"
    hints:
      - "Move your king from e1 to g1 to castle."
      - "Castle early! Your king is safe and your rook becomes active."
    hints_zh:
      - "把國王從 e1 移到 g1 進行易位。"
      - "盡早易位！國王安全了，車也變活躍了。"
    explanation: "King secure! Now your entire kingside is nicely set up. Black develops their other knight."
    explanation_zh: "國王安全了！現在你整個王翼佈局都很漂亮。黑方發展另一匹馬。"

  - fen: "r1bq1rk1/pppn1ppp/3bpn2/3p4/3P1B2/3BPN2/PPP2PPP/RN1Q1RK1 w - - 6 7"
    instruction: "Develop your last knight to d2. In the London, the knight goes to d2 (not c3) to keep c3 free for a future pawn push!"
    instruction_zh: "把最後一匹馬發展到 d2。在倫敦體系中，馬去 d2（不是 c3），為未來的兵推保留 c3！"
    expected_move: "b1d2"
    illustrate: "Here's a subtle London idea — the knight goes to d2 instead of c3. Why? Because we want to keep c3 free for our c-pawn, which will push forward later to support the center. It also protects the e4 square for a future pawn push."
    illustrate_zh: "這是倫敦的細膩想法 — 馬去 d2 而不是 c3。為什麼？因為我們要把 c3 留給 c 兵，它之後會往前推來支撐中心。這也保護了 e4 格，為未來的兵推做準備。"
    demo_narration: "This knight goes to this spot instead of the more obvious square. It looks modest, but it's actually very clever — it keeps our options open for the next big move."
    demo_narration_zh: "這匹馬去了這個位置而不是更明顯的格子。看起來很謙虛，但其實非常聰明 — 它為下一個大動作保留了選擇。"
    ending: "Develop your last piece — bring the knight out!"
    ending_zh: "發展你最後一個棋子 — 把馬帶出來！"
    hints:
      - "Move your knight from b1 to d2."
      - "Nbd2 is the London way — it keeps c3 free for the c-pawn and supports a future e4 push."
    hints_zh:
      - "把馬從 b1 移到 d2。"
      - "Nbd2 是倫敦的走法 — 保留 c3 給 c 兵，並支持未來的 e4 推進。"
    explanation: "All your minor pieces are developed! The London setup is famous for being easy to remember: d4, Bf4, e3, Nf3, Bd3, O-O, Nbd2. Black challenges the center with c5."
    explanation_zh: "所有小棋子都發展了！倫敦佈陣的出名之處在於容易記憶：d4、Bf4、e3、Nf3、Bd3、O-O、Nbd2。黑方用 c5 挑戰中心。"

  - fen: "r1bq1rk1/pp1n1ppp/3bpn2/2pp4/3P1B2/3BPN2/PPPN1PPP/R2Q1RK1 w - - 0 8"
    instruction: "Play c3 to complete the London structure! Your center becomes unbreakable and you're ready for the middlegame."
    instruction_zh: "走 c3 完成倫敦結構！你的中心變得堅不可摧，你準備好進入中局了。"
    expected_move: "c2c3"
    illustrate: "The final piece of the puzzle! This pawn move completes the London's trademark pawn structure — a solid triangle that's incredibly hard to attack. From here you can choose to push for e4 later, or maneuver your pieces for a kingside attack."
    illustrate_zh: "最後一塊拼圖！這步兵完成了倫敦的招牌兵形 — 一個堅固的三角形，極難被攻擊。從這裡你可以選擇之後推 e4，或者調動棋子發動王翼攻擊。"
    demo_narration: "This pawn locks everything into place. The center is now a fortress. You have a complete, professional opening setup."
    demo_narration_zh: "這個兵把一切鎖定到位。中心現在是一座堡壘。你有了一個完整的、專業的開局佈陣。"
    ending: "Complete your London — lock in the structure!"
    ending_zh: "完成你的倫敦 — 鎖定結構！"
    hints:
      - "Push your c-pawn one square from c2 to c3."
      - "c3 completes the London pawn triangle: d4-e3-c3. It supports d4 and prepares for action."
    hints_zh:
      - "把 c 兵從 c2 推一格到 c3。"
      - "c3 完成倫敦的兵三角形：d4-e3-c3。支撐 d4 並準備行動。"
    explanation: "The London System is complete! You've built the classic setup: pawns on d4-e3-c3, bishops on f4 and d3, knights on f3 and d2, king safely castled. This setup works against almost anything Black plays — that's why it's one of the most popular openings at every level. Now you know a reliable weapon for White!"
    explanation_zh: "倫敦體系完成了！你建立了經典佈陣：d4-e3-c3 的兵、f4 和 d3 的象、f3 和 d2 的馬、國王安全易位。這個佈陣幾乎對黑方的任何走法都有效 — 這就是為什麼它在每個水平都是最流行的開局之一。現在你有了白方的可靠武器！"
